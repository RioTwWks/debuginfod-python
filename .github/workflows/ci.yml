name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xdelta3 gcc binutils

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xdelta3 gcc binutils

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Generate test ELF versions
        run: python scripts/generate_test_artifacts.py -o /tmp/versions -n 5

      - name: Smoke test xdelta3 delta storage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from debuginfod.db import Database
          from debuginfod.delta_store import DeltaStore
          from debuginfod.indexer import Indexer

          db = Database(Path("/tmp/ci-debuginfod.sqlite"))
          store = DeltaStore(
              db=db,
              blob_dir=Path("/tmp/ci-blobs"),
              reconstruct_cache_dir=Path("/tmp/ci-cache"),
          )
          stats = Indexer(db=db, store=store, scan_paths=[Path("/tmp/versions")]).scan()
          report = db.get_stats()

          assert stats.files_indexed == 5, stats
          assert stats.deltas_stored >= 4, stats
          assert report["artifact_count"] == 5, report
          assert report["compression_ratio"] < 0.5, report

          print(json.dumps(report, indent=2))
          PY

      - name: Smoke test HTTP API
        run: |
          python -m debuginfod \
            -d /tmp/ci-http.sqlite \
            --blob-dir /tmp/ci-http-blobs \
            -s /tmp/versions \
            -p 18003 &
          server_pid=$!

          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18003/readyz >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://127.0.0.1:18003/healthz | grep -q ok
          curl -sf http://127.0.0.1:18003/stats | python -c "import json,sys; d=json.load(sys.stdin); assert d['artifact_count'] >= 1"

          build_id=$(curl -sf "http://127.0.0.1:18003/metadata?key=glob&value=*demo_v*" \
            | python -c "import json,sys; print(json.load(sys.stdin)['results'][0]['buildid'])")
          curl -sf "http://127.0.0.1:18003/buildid/${build_id}/executable" | head -c 4 | grep -q $'\x7fELF'

          kill "$server_pid"
          wait "$server_pid" 2>/dev/null || true
